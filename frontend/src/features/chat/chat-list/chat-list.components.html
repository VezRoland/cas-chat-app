<div class="w-full flex-1 flex-col-reverse overflow-auto">
  <mat-nav-list>
    @for (preview of previews(); track preview.id; let i = $index) {
      <a routerLink="/chat/{{ preview.id }}">
        <mat-list-item class="py-2">
          <span matListItemTitle>{{ preview.title }}</span>
        </mat-list-item>
      </a>
      @if (i < previews().length - 1) {
        <mat-divider></mat-divider>
      }
    }
  </mat-nav-list>
</div>
