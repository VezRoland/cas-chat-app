<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body class="h-screen grid place-items-center">
    <div class="w-full max-w-md flex flex-col gap-8 p-4">
      <header>
        <h1 class="text-2xl">Sign In</h1>
        <h2>Log into your existing account.</h2>
      </header>

      <main>
        <form class="w-full flex flex-col" (submit)="onSubmit($event)">
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput [formField]="signUpForm.email" placeholder="email@address.com" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input
              matInput
              type="password"
              [formField]="signUpForm.password"
              placeholder="********"
            />
          </mat-form-field>
          <button matButton="filled">Sign In</button>
          <a class="pt-2 text-center underline" href="/signup">Don't have an account? Sign up!</a>
        </form>
      </main>
    </div>
  </body>
</html>
