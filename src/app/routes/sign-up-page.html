<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body class="h-screen grid place-items-center">
  <div class="flex flex-col gap-8">
    <header>
      <h1 class="text-2xl">Sign Up</h1>
      <h2>Create a new account.</h2>
    </header>
  
    <main>
      <form class="flex flex-col" (submit)="onSubmit($event)">
        <div class="flex gap-2">
          <mat-form-field appearance="outline">
            <mat-label>First Name</mat-label>
            <input matInput [formField]="signUpForm.firstName" placeholder="First Name">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>First Name</mat-label>
            <input matInput [formField]="signUpForm.lastName" placeholder="Last Name">
          </mat-form-field>
        </div>
          <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input matInput [formField]="signUpForm.username" placeholder="Username">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput [formField]="signUpForm.email" placeholder="email@address.com">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput type="password" [formField]="signUpForm.password" placeholder="********">
          </mat-form-field>
        <button matButton="filled">Sign Up</button>
      </form>
    </main>
  </div>
</body>
</html>
