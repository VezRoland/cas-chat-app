<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body class="h-screen grid place-items-center">
    <div class="w-full max-w-md flex flex-col gap-8 p-4">
      <header>
        <h1 class="text-2xl">Sign Up</h1>
        <h2>Create a new account.</h2>
      </header>

      <main>
        <form class="w-full sm:flex-wrap flex flex-col" (submit)="onSubmit($event)">
          <div class="flex flex-wrap sm:flex-nowrap gap-2">
            <mat-form-field class="flex-1" appearance="outline">
              <mat-label>First Name</mat-label>
              <input matInput [formField]="signUpForm.firstName" placeholder="John" />
            </mat-form-field>
            <mat-form-field class="flex-1" appearance="outline">
              <mat-label>Last Name</mat-label>
              <input matInput [formField]="signUpForm.lastName" placeholder="Doe" />
            </mat-form-field>
          </div>
          <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input matInput [formField]="signUpForm.username" placeholder="johndoe" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput [formField]="signUpForm.email" placeholder="johndoe@domain.com" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input
              matInput
              type="password"
              [formField]="signUpForm.password"
              placeholder="********"
            />
          </mat-form-field>
          <button matButton="filled">Sign Up</button>
          <a class="pt-2 text-center underline" href="/signin">Already have an account? Sign in!</a>
        </form>
      </main>
    </div>
  </body>
</html>
